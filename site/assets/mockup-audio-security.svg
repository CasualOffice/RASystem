<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 700" width="1120" height="700" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="Representative UI: the Share (host) screen with a connection ticket, the blue AUDIO SHARED indicator, and two off-by-default opt-in toggles — Allow clipboard sharing and Share system audio — conveying the consent-first model where each capability is opted into by the machine's owner.">
  <defs>
    <style>
      .win     { fill:#0b0b0e; }
      .btn      { fill:#23232c; stroke:#33333f; stroke-width:1; }
      .btntxt   { font-size:13px; font-weight:600; fill:#e8e8ee; }
      .btntxt-w { font-size:13px; font-weight:600; fill:#ffffff; }
      .h2       { font-size:17px; font-weight:600; fill:#e8e8ee; }
      .lead     { font-size:13.5px; fill:#b9b9c6; }
      .status   { font-size:13px; fill:#9a9aa8; }
      .note     { font-size:12px; fill:#7a7a88; }
      .ticket   { fill:#050507; stroke:#33333f; stroke-width:1; }
      .tickettxt{ font-size:12px; fill:#7cfc7c; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
      .ind-audio{ fill:#0a84ff; }
      .ind-idle { fill:#23232c; }
      .ind-live { fill:#c81e1e; }
      .indtxt-w { font-size:12px; font-weight:600; fill:#ffffff; }
      .indtxt-m { font-size:12px; font-weight:600; fill:#9a9aa8; }
      .optrow   { fill:#16161d; stroke:#2a2a34; stroke-width:1; }
      .optbox   { fill:#0b0b0e; stroke:#55558a; stroke-width:1.5; }
      .optbox-on{ fill:#6f6ff0; stroke:#6f6ff0; stroke-width:1.5; }
      .opttitle { font-size:13.5px; font-weight:600; fill:#e8e8ef; }
      .optnote  { font-size:12px; fill:#7a7a88; }
      .danger   { fill:#7a1f1f; stroke:#8a2b2b; stroke-width:1; }
      .check    { stroke:#ffffff; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .spk      { stroke:#ffffff; stroke-width:1.6; fill:none; stroke-linecap:round; stroke-linejoin:round; }
    </style>
  </defs>

  <rect class="win" x="0" y="0" width="1120" height="700" rx="14"/>

  <!-- ── header bar ──────────────────────────────────────────── -->
  <rect class="btn" x="40" y="34" width="70" height="32" rx="6"/>
  <text x="54" y="55" class="btntxt">&#8592; Back</text>
  <text x="128" y="56" class="h2">Share this screen</text>
  <!-- AUDIO SHARED indicator (blue, pulsing halo drawn as a soft ring) -->
  <rect x="760" y="34" width="150" height="30" rx="6" fill="#0a84ff" fill-opacity="0.28"/>
  <rect class="ind-audio" x="764" y="38" width="142" height="22" rx="6"/>
  <g transform="translate(776,44)"><path class="spk" d="M0 3v4h3l4 3V0L3 3H0z"/><path class="spk" d="M9 4a3 3 0 0 1 0 5"/></g>
  <text x="798" y="53" class="indtxt-w">AUDIO SHARED</text>
  <!-- LIVE indicator -->
  <rect class="ind-live" x="924" y="34" width="156" height="30" rx="6"/>
  <text x="940" y="53" class="indtxt-w">&#9679; REMOTE VIEWING ACTIVE</text>

  <!-- ── lead + ticket ───────────────────────────────────────── -->
  <text x="40" y="108" class="lead">Send this connection ticket to the person who will view your screen:</text>
  <rect class="ticket" x="40" y="124" width="900" height="58" rx="8"/>
  <text x="54" y="146" class="tickettxt">CASUALRAS1:8f2a1c09b47e6d2f0a13c8e5&#8230;</text>
  <text x="54" y="164" class="tickettxt">&#8230;b4f19e71d3a06c2891ff45</text>
  <rect class="btn" x="952" y="124" width="128" height="58" rx="8"/>
  <text x="1016" y="158" class="btntxt" text-anchor="middle">Copy</text>
  <text x="40" y="206" class="status">Waiting for a viewer to connect&#8230;</text>

  <!-- ── opt-in toggle: clipboard (off) ──────────────────────── -->
  <rect class="optrow" x="40" y="226" width="1040" height="72" rx="10"/>
  <rect class="optbox" x="60" y="248" width="18" height="18" rx="4"/>
  <text x="96" y="256" class="opttitle">Allow clipboard sharing</text>
  <text x="96" y="278" class="optnote">Off by default. When on, the viewer can read and set your clipboard for the session.</text>
  <text x="96" y="294" class="optnote">Set this before the viewer connects.</text>

  <!-- ── opt-in toggle: system audio (ON, checked) ───────────── -->
  <rect class="optrow" x="40" y="310" width="1040" height="72" rx="10"/>
  <rect class="optbox-on" x="60" y="332" width="18" height="18" rx="4"/>
  <path class="check" d="M64 341l3 3 6-6"/>
  <text x="96" y="340" class="opttitle">Share system audio</text>
  <text x="96" y="362" class="optnote">Off by default. When on, the viewer will hear this machine's audio, and a</text>
  <text x="96" y="378" class="optnote">shared-audio indicator stays visible while it plays.</text>

  <!-- ── stop + note ─────────────────────────────────────────── -->
  <rect class="danger" x="40" y="410" width="126" height="40" rx="8"/>
  <text x="103" y="435" class="btntxt-w" text-anchor="middle">Stop sharing</text>
  <text x="182" y="426" class="note">The viewer sees your screen. Remote keyboard/mouse control, if</text>
  <text x="182" y="442" class="note">requested, asks you for a separate Allow first.</text>

  <!-- ── consent-first caption strip ─────────────────────────── -->
  <rect x="40" y="486" width="1040" height="176" rx="12" fill="#101017" stroke="#26262f" stroke-width="1"/>
  <text x="64" y="522" font-size="14" font-weight="700" fill="#7be0cf" letter-spacing="0.12em">CONSENT-FIRST BY CONSTRUCTION</text>
  <!-- three points -->
  <g transform="translate(64,548)">
    <circle cx="6" cy="6" r="4" fill="#57d98a"/>
    <text x="22" y="10" font-size="13.5" fill="#c7c8d4">Every capability is off by default and opted into by the machine's owner &#8212; never the viewer.</text>
    <circle cx="6" cy="42" r="4" fill="#7be0cf"/>
    <text x="22" y="46" font-size="13.5" fill="#c7c8d4">Sharing audio keeps an always-visible "AUDIO SHARED" disclosure the interface cannot suppress.</text>
    <circle cx="6" cy="78" r="4" fill="#8b8cf6"/>
    <text x="22" y="82" font-size="13.5" fill="#c7c8d4">The host enforces capability scope per message &#8212; a claimed scope is never trusted.</text>
  </g>
</svg>
