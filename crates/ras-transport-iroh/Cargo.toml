[package]
name = "ras-transport-iroh"
description = "Casual RAS Iroh/QUIC transport adapter: endpoints, ALPN, channels, relay."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true

[dependencies]
bytes = "1"
tokio = { version = "1", features = ["io-util"] }
ras-protocol = { path = "../ras-protocol" }
ras-media = { path = "../ras-media" }

[dev-dependencies]
# The framed-control-channel tests drive it over an in-memory duplex.
tokio = { version = "1", features = ["io-util", "macros", "rt", "rt-multi-thread"] }

[lints]
workspace = true
