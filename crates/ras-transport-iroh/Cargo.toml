[package]
name = "ras-transport-iroh"
description = "Casual RAS Iroh/QUIC transport adapter: endpoints, ALPN, channels, relay."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true

[dependencies]
bytes = "1"
# Iroh/QUIC transport. Pin EXACT (CLAUDE §6) — 1.0.2 is the version validated by spike/iroh-probe.
# No `unstable-*` features.
iroh = "=1.0.2"
# Gossip presence (ADR-094): advertise its ALPN + expose the raw endpoint so the app can attach a
# `Gossip` actor to this same endpoint. Same pin as `ras-signal` — one iroh in the tree.
iroh-gossip = "0.101"
tokio = { version = "1", features = ["io-util", "rt", "sync", "time", "macros"] }
ras-protocol = { path = "../ras-protocol" }
ras-media = { path = "../ras-media" }

[dev-dependencies]
# The framed-control-channel tests drive it over an in-memory duplex; the iroh-session test needs a
# multi-thread runtime (concurrent accept/dial tasks) plus timers.
tokio = { version = "1", features = ["io-util", "macros", "rt", "rt-multi-thread", "time"] }

[lints]
workspace = true
