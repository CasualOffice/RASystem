ras-policy = { path = "../ras-policy" }
ras-bootstrap = { path = "../ras-bootstrap" }
bytes = "1"
async-trait = "0.1"
getrandom = "0.2"

[dev-dependencies]
proptest = "1"
tokio = { version = "1", features = ["rt", "macros"] }

[lints]
workspace = true
