[package]
name = "ras-grant"
description = "Casual RAS access requests, session grants (PASETO v4.public), and the grant-issuer trait."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true

[dependencies]
ras-protocol = { path = "../ras-protocol" }
