name: release

# Build the unified desktop app and publish it to a GitHub Release.
#
# Trigger by pushing a tag like `v0.0.1-alpha`, or run manually (workflow_dispatch) to produce a
# draft release you can inspect before publishing.
#
# One app, both roles (ADR-062): **Connect** (view another machine) works on every desktop OS today
# because it is decode-only; **Share** now also works on Linux/Windows via the scap capture backend
# (ADR-063), not just macOS. The same app ships on macOS (.dmg), Linux (.AppImage + .deb) and
# Windows (.exe/NSIS).
#
# The Linux job pins **ubuntu-22.04**, not `ubuntu-latest`. glibc is backward- but not
# forward-compatible, so the build base is the compatibility floor: `ubuntu-latest` (24.04, glibc
# 2.39) produced artifacts that would not start on Ubuntu 22.04 (glibc 2.35). Pin to the oldest
# distro we support. If this label is changed, update the `Linux system deps` step's `if:` to match.
#
# Builds are **unsigned** in the alpha: macOS shows a Gatekeeper warning (right-click → Open), and
# Windows SmartScreen may warn. EV code-signing with HSM-held keys comes with the release-hardening
# phase (docs/08). Nothing here uploads or notarizes secrets.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to attach the draft release to (e.g. v0.0.1-alpha)"
        required: true
        default: "v0.0.0-dev"

permissions:
  contents: write # create the release and upload assets

jobs:
  # Gate the release on the FULL test suite + lints + license/advisory check before any artifact is
  # built or published. Previously the release pipeline built + published with no tests run at all (the
  # parallel `ci.yml` could be red while a tag still shipped). The build matrix below `needs: gate`, so
  # a failing gate blocks every publish — you can never release from a red tree.
  gate:
    name: gate (fmt / clippy / test / deny)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: ilammy/setup-nasm@v1
      - name: Linux system deps
        run: |
          sudo add-apt-repository -y ppa:pipewire-debian/pipewire-upstream
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libpipewire-0.3-dev \
            libpulse-dev \
            libdbus-1-dev \
            libclang-dev \
            pkg-config
      - name: workspace fmt
        run: cargo fmt --all -- --check
      - name: workspace clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: workspace test
        run: cargo test --all
      # The app is out of the workspace (heavy WebView deps), so it's linted here explicitly — otherwise
      # nothing checks the app's lints/format before it ships (the build only checks that it compiles).
      - name: app fmt + clippy
        run: |
          cargo fmt --manifest-path app/src-tauri/Cargo.toml -- --check
          cargo clippy --manifest-path app/src-tauri/Cargo.toml --all-targets -- -D warnings
      - name: license & advisory gate
        uses: EmbarkStudios/cargo-deny-action@v2

  build:
    needs: gate
    name: app (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # nasm builds OpenH264's x86 assembly (Linux/Windows sharing backends) on x86 runners.
      - uses: ilammy/setup-nasm@v1

      # macOS libvpx: the app links ras-media-vpx on macOS now (codec negotiation — a macOS host can
      # encode VP9 for WebKitGTK viewers that can't decode our H.264). ras-media-vpx finds libvpx via
      # pkg-config at build time, so the macOS app bundle needs Brew's libvpx present.
      - name: macOS VPX dep
        if: matrix.os == 'macos-latest'
        run: brew install libvpx pkg-config

      # WebView + bundling system deps for Tauri v2 on Linux (webkit2gtk 4.1).
      #
      # PipeWire: scap 0.0.8 hard-requires the `pipewire`/`libspa` 0.8 crates, whose `libspa-sys`
      # binds against the SYSTEM PipeWire headers. Ubuntu 22.04's stock PipeWire (0.3.48) predates
      # `spa_video_info_raw.flags`, so libspa 0.8 fails to compile against it. We stay on 22.04 for the
      # glibc-2.35 floor (broad Linux compat — a 24.04 build would need glibc 2.39), and instead pull a
      # newer PipeWire from the maintained pipewire-debian/pipewire-upstream PPA so libspa 0.8 builds.
      - name: Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo add-apt-repository -y ppa:pipewire-debian/pipewire-upstream
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libpipewire-0.3-dev \
            libpulse-dev \
            libdbus-1-dev \
            libclang-dev \
            pkg-config \
            libvpx-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/src-tauri/target
          key: ${{ matrix.os }}-app-${{ hashFiles('app/src-tauri/Cargo.lock') }}

      - name: Build & publish Casual RAS
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signed auto-update (ADR-078). These sign the update artifacts + `latest.json` with the
          # project's Ed25519 (minisign) key. Harmless while the secrets are unset (no signing runs and
          # `createUpdaterArtifacts` is off, so nothing errors). To activate signed updates: generate a
          # key, add these two repo secrets, paste the public key into `tauri.conf.json`
          # (`plugins.updater.pubkey`), and set `bundle.createUpdaterArtifacts: true` — see the runbook.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app/src-tauri
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Casual RAS ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            Alpha build of **Casual RAS** — one desktop app that does both roles:

            - **Connect** to another machine and view its screen (with a remote pointer to point at
              things). Verified on **macOS**; expected to work on **Windows**. **Linux viewing is
              limited**: the Linux WebView (WebKitGTK) often can't decode the H.264 video stream, in
              which case the app shows an honest "can't display the shared screen" message rather than
              a black screen — a native decode fallback is planned.
            - **Share** this machine's screen — it asks you for Allow/Deny before any pixels leave.
              **Verified on macOS.** Linux/Windows sharing is **experimental** — built and
              compile-checked in CI but **not yet verified on real hardware**; Linux control/capture
              needs an **X11/Xwayland** session (a pure Wayland session is not yet supported).

            > This is an **alpha**. The networked and OS-level paths are extensively unit-tested but
            > on-device verification across machines/OSes is still in progress — expect rough edges,
            > and please report what breaks.

            **Remote control** is available only when the machine being shared is a **macOS** host,
            and requires a *second*, separate Allow/Deny from that machine's local user before any
            click or keystroke is injected. Sharing from Linux/Windows is view-only for now — no
            input backend exists on those platforms yet. While remote control is live, the shared
            machine shows an always-visible "REMOTE CONTROL ACTIVE" indicator and a Stop button that
            cuts input immediately.

            Peer-to-peer over Iroh/QUIC — no server involved.

            Linux builds target **Ubuntu 22.04 and newer** (glibc 2.35+).

            Builds are **unsigned** — on macOS, right-click → Open to bypass Gatekeeper the first time;
            on Windows, "More info → Run anyway" past SmartScreen.
          releaseDraft: true
          prerelease: true

  # Supply-chain artifacts: a CycloneDX SBOM + a full third-party license notices file for the exact
  # dependency tree shipped in this release, attached to the GitHub release. Runs AFTER `build` (so the
  # release exists to upload to) and only if the `gate` passed. A failure here never un-publishes the
  # release — it just flags that the artifacts are missing.
  sbom:
    name: SBOM + third-party notices
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install SBOM tools
        run: cargo install cargo-cyclonedx cargo-bundle-licenses
      - name: Generate CycloneDX SBOM (the shipped app's full dependency tree)
        run: cargo cyclonedx --manifest-path app/src-tauri/Cargo.toml --format json
      - name: Generate third-party license notices
        working-directory: app/src-tauri
        run: cargo bundle-licenses -f toml -o "$GITHUB_WORKSPACE/THIRD-PARTY-NOTICES.toml"
      - name: Attach artifacts to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release upload "$TAG" \
            app/src-tauri/casual-ras.cdx.json \
            THIRD-PARTY-NOTICES.toml \
            --clobber
