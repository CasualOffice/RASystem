name: ci

on:
  push:
  pull_request:

jobs:
  check:
    name: fmt / clippy / test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: test
        run: cargo test --all
      - name: bench (hot-path smoke + sanity ceiling)
        # Not a precise perf gate — runs the hand-rolled micro-benchmarks so a gross regression
        # (hang / O(n²) / alloc storm) trips the loose per-op sanity ceiling. Prints ns/op baselines.
        run: cargo bench -p ras-core --bench hot_paths

  deny:
    name: license & advisory gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
