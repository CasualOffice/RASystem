# cargo-deny — enforces the Casual RAS license policy (ADR-051): permissive + MPL only; any
# GPL/LGPL/AGPL/SSPL dependency fails the build. Run: `cargo deny check`.
[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "MPL-2.0",
]
# Scoped exceptions for permissive licenses that appear ONLY in iroh's transitive tree (iroh is
# CLAUDE §6-sanctioned). None are GPL-family, so Invariant 18 holds; each is genuinely permissive and
# allowed only for the specific crate that carries it — the global allow-list above is unchanged.
exceptions = [
  # Unlicense = public-domain dedication (OSI + FSF approved). These are wasm-only websocket helpers
  # pulled by iroh-relay's browser path; never linked on the native host/controller.
  { crate = "ws_stream_wasm", allow = ["Unlicense"] },
  { crate = "async_io_stream", allow = ["Unlicense"] },
  { crate = "pharos", allow = ["Unlicense"] },
  # CDLA-Permissive-2.0 covers the certificate *data* in Mozilla's webpki root bundles (permissive,
  # no copyleft); used by iroh-relay for relay TLS.
  { crate = "webpki-roots", allow = ["CDLA-Permissive-2.0"] },
  { crate = "webpki-root-certs", allow = ["CDLA-Permissive-2.0"] },
  # BSL-1.0 = Boost Software License 1.0: a mainstream permissive, **non-copyleft** license (more
  # liberal than MIT — no binary-attribution requirement), OSI + FSF approved and GPL-compatible, so
  # Invariant 18 (deny only GPL/LGPL/AGPL/SSPL) holds. These two crates are the **Windows-only**
  # clipboard backend pulled by `arboard` (ADR-079); never linked on macOS/Linux.
  { crate = "clipboard-win", allow = ["BSL-1.0"] },
  { crate = "error-code", allow = ["BSL-1.0"] },
]
confidence-threshold = 0.9

[advisories]
# Each entry is *unmaintained* (informational), NOT a vulnerability. Real vulnerability + yanked
# advisories still fail the build — these are single, named, justified exceptions.
#
# - RUSTSEC-2024-0436 `paste`: a stable, ubiquitous proc-macro helper pulled transitively by iroh
#   (CLAUDE §6); no drop-in replacement, no known security issue.
# - RUSTSEC-2026-0150 `audiopus_sys`: the thin FFI `-sys` wrapper under `audiopus` (our Opus codec,
#   ADR-080) is unmaintained, and 0.2.2 is the latest — no safe upgrade exists. The advisory's *only*
#   concrete concern is that it references a pre-3.5 CMake policy that CMake 4.0 rejects; we **already
#   mitigate** that at the build level (`.cargo/config.toml` sets `CMAKE_POLICY_VERSION_MINIMUM=3.5`,
#   ADR-080), so the vendored libopus (BSD-3, Xiph — permissive, Inv 18) still builds cleanly on every
#   CI runner. No CVE, no exploitable surface (encode/decode of our own audio). Follow-up: evaluate a
#   maintained Opus binding (e.g. a `libopus`/`opus` wrapper) once one that vendors cleanly exists.
ignore = ["RUSTSEC-2024-0436", "RUSTSEC-2026-0150"]

[bans]
multiple-versions = "warn"
wildcards = "warn"
# Workspace-internal path deps are intentionally version-less; don't flag them as wildcards.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
