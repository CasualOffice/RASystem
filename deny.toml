# cargo-deny — enforces the Casual RAS license policy (ADR-051): permissive + MPL only; any
# GPL/LGPL/AGPL/SSPL dependency fails the build. Run: `cargo deny check`.
[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "MPL-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "warn"
# Workspace-internal path deps are intentionally version-less; don't flag them as wildcards.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
