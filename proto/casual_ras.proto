syntax = "proto3";

package casual_ras.v1;

// Wire source of truth for Casual RAS. See docs/04_PROTOCOL_AND_TOKEN_SPEC.md.
//
// Codegen is pure-Rust/offline (protox + prost-build in crates/ras-protocol/build.rs → OUT_DIR),
// so NO system protoc is required. NEVER hand-edit generated code — edit this file and regenerate.
// These types are an INTERNAL codec detail of ras-protocol; the ergonomic public API is the
// hand-rolled `ras_protocol::ControlMsg` and friends, which the codec layer maps to/from these
// messages losslessly.
//
// Numbering is STABLE and APPEND-ONLY: never renumber or repurpose an existing field or enum
// value; only add new ones. (Non-Negotiable Invariant: stable wire mappings.)

// Placeholder liveness message. Kept as-is for compatibility.
message Ping {
  uint64 nonce = 1;
}

// ---------------------------------------------------------------------------
// Enums
// ---------------------------------------------------------------------------

// Stable machine-readable error taxonomy. Mirrors ras_protocol::ErrorCode (docs/04 §14).
// proto3 requires a zero default: ERROR_CODE_UNSPECIFIED is a sentinel that MUST NOT appear on
// the wire for a well-formed Bye. The codec rejects UNSPECIFIED / unknown values with a typed
// RasError(InvalidMessage) — it is never silently defaulted.
enum ErrorCodeProto {
  ERROR_CODE_UNSPECIFIED         = 0;
  ERROR_CODE_INVALID_MESSAGE     = 1;
  ERROR_CODE_UNSUPPORTED_VERSION = 2;
  ERROR_CODE_IDENTITY_MISMATCH   = 3;
  ERROR_CODE_SIGNATURE_INVALID   = 4;
  ERROR_CODE_REQUEST_EXPIRED     = 5;
  ERROR_CODE_REPLAY_DETECTED     = 6;
  ERROR_CODE_CONSENT_DENIED      = 7;
  ERROR_CODE_CAPABILITY_DENIED   = 8;
  ERROR_CODE_GRANT_INVALID       = 9;
  ERROR_CODE_LEASE_INVALID       = 10;
  ERROR_CODE_SESSION_REVOKED     = 11;
  ERROR_CODE_TRANSPORT_ERROR     = 12;
  ERROR_CODE_CAPTURE_FAILED      = 13;
  ERROR_CODE_ENCODER_FAILED      = 14;
  ERROR_CODE_INPUT_FAILED        = 15;
  ERROR_CODE_POLICY_CHANGED      = 16;
  ERROR_CODE_INTERNAL            = 17;
  ERROR_CODE_NORMAL_CLOSURE      = 18; // intentional, fault-free teardown (WebSocket-1000-style)
}

// Why a controller needs a fresh IDR. Mirrors ras_protocol::KeyframeReason.
// KEYFRAME_REASON_UNSPECIFIED is a proto3-default sentinel; the codec rejects it and unknown
// values with RasError(InvalidMessage).
enum KeyframeReasonProto {
  KEYFRAME_REASON_UNSPECIFIED        = 0;
  KEYFRAME_REASON_STREAM_START       = 1;
  KEYFRAME_REASON_UNRECOVERABLE_LOSS = 2;
  KEYFRAME_REASON_DECODER_RESET      = 3;
  KEYFRAME_REASON_CONFIG_CHANGED     = 4;
  KEYFRAME_REASON_PERIODIC_REFRESH   = 5;
}

// ---------------------------------------------------------------------------
// Supporting messages
// ---------------------------------------------------------------------------

// Wire projection of ras_media::StreamConfig (ras_protocol::StreamConfigWire).
// `color` and `video_transport` are small integer tags (proto has no u8); the codec validates they
// fit in u8 on decode and rejects out-of-range with RasError(InvalidMessage).
message StreamConfig {
  string codec              = 1; // e.g. "avc1.4D401F"
  uint32 width              = 2;
  uint32 height             = 3;
  uint32 fps                = 4;
  uint32 target_bitrate_bps = 5;
  uint32 color              = 6; // u8 tag: 0 = BT.709 limited, 1 = BT.709 full
  uint32 video_transport    = 7; // u8 tag: 0 = per-frame stream, 1 = datagram+FEC
}

// Canonical keyframe/IDR request (controller → host). Mirrors ras_protocol::KeyframeRequest.
message KeyframeRequest {
  uint64              since_frame = 1; // FrameId; last frame the controller holds
  KeyframeReasonProto reason      = 2;
}

// Content-free decoder feedback (controller → host). Counters/timing only — never pixels.
// Mirrors ras_protocol::DecoderFeedback.
message DecoderFeedback {
  uint64 last_decoded_frame = 1; // FrameId
  uint32 frames_dropped     = 2;
  uint32 decode_latency_us  = 3;
  // Present ⇔ Rust Option<KeyframeRequest>::Some. proto3 `optional` gives explicit presence, so
  // None (field absent) and Some(default-valued request) are distinguishable.
  optional KeyframeRequest keyframe_request = 4;
}

// Session-open handshake payload.
message Hello {
  uint32 protocol_version = 1;
}

// Opaque access-request / consent bytes. Payload is round-tripped LOSSLESSLY and never interpreted
// here (Phase-2 slot). Empty in Phase 1.
message AuthEnvelope {
  bytes payload = 1;
}

// Graceful teardown with a stable reason code.
message Bye {
  ErrorCodeProto code = 1;
}

// Controller -> host: the controller's pointer position over the shared screen, for a *remote
// pointer* overlay on the host ("look here"). This is NOT OS input — no click, no keyboard; nothing
// reaches the host's input system. Coordinates are normalized fixed-point (0..=65535 = 0.0..=1.0 of
// the shared frame) so they survive any resolution/scaling. `x`/`y` are u16 carried in uint32.
message PointerUpdate {
  uint32 x       = 1; // 0..=65535 → left..right
  uint32 y       = 2; // 0..=65535 → top..bottom
  bool   visible = 3; // false → hide the overlay cursor
}

// Viewer annotation markup rendered on the HOST's overlay (ADR-097). Display data — NOT OS input and
// NOT a secret (drawing coordinates + a colour, like the visual pointer), so it carries NO capability.
// `points` are packed (x<<16)|y, each normalized 0..=65535 over the shared frame; the count is bounded
// (MAX_ANNOT_POINTS) on decode — fail-closed. op: 0=stroke, 1=undo (drop last), 2=clear (drop all).
message Annotate {
  uint32 op    = 1; // 0=stroke, 1=undo, 2=clear
  uint32 tool  = 2; // 0=pen, 1=highlighter, 2=arrow, 3=rect
  uint32 color = 3; // 0xRRGGBB
  repeated uint32 points = 4; // packed (x<<16)|y; bounded MAX_ANNOT_POINTS on decode
}

// ---------------------------------------------------------------------------
// Phase 3 — OS input (ADR-067). Coordinates are normalized fixed-point u16
// (0..=65535 = 0.0..=1.0 of a display) carried in uint32; the codec validates
// the u16/i16/u8 ranges on decode and rejects out-of-range as InvalidMessage.
// ---------------------------------------------------------------------------

// Closed set of injectable pointer buttons. UNSPECIFIED is a proto3-default sentinel the codec
// rejects (never silently defaulted). Mirrors ras_protocol::PointerButton.
enum PointerButtonProto {
  POINTER_BUTTON_UNSPECIFIED = 0;
  POINTER_BUTTON_LEFT        = 1;
  POINTER_BUTTON_RIGHT       = 2;
  POINTER_BUTTON_MIDDLE      = 3;
}

message PointerMove {
  uint32 display_id     = 1;
  uint32 nx             = 2; // 0..=65535
  uint32 ny             = 3; // 0..=65535
  uint32 layout_version = 4;
}

message PointerButtonEvent {
  uint32             display_id     = 1;
  uint32             nx             = 2; // 0..=65535
  uint32             ny             = 3; // 0..=65535
  uint32             layout_version = 4;
  PointerButtonProto button         = 5;
  bool               down           = 6;
}

message PointerWheel {
  int32 dx = 1; // i16 range; right positive
  int32 dy = 2; // i16 range; down positive
}

// Relative pointer motion (pixel delta from the current position) for trackpad/touch controllers
// (ADR-087). Display-independent — no display_id/layout_version. ras_protocol::InputAction::PointerMoveRelative.
message PointerMoveRelative {
  int32 dx = 1; // i16 range; right positive
  int32 dy = 2; // i16 range; down positive
}

message KeyEvent {
  uint32 hid_usage = 1; // u16 USB-HID usage
  bool   down      = 2;
  uint32 modifiers = 3; // u8 modifier bitset
}

message TextInput {
  string utf8 = 1; // bounded by MAX_TEXT_INPUT; content-bearing, never logged
}

message ReleaseAllKeys {}

// Authoritative lock-key STATE (not an edge): the host slaves its CapsLock/NumLock to these so case
// and keypad output match the controller (edge-forwarding a lock key desyncs — every VNC/RDP/Sunshine
// tracker proves it). ras_protocol::InputAction::SetLockState.
message SetLockState {
  bool caps_lock = 1;
  bool num_lock  = 2;
}

// One OS-input action. Exactly one variant is set; an unset oneof decodes to InvalidMessage.
message InputAction {
  oneof action {
    PointerMove        pointer_move     = 1;
    PointerButtonEvent pointer_button   = 2;
    PointerWheel       pointer_wheel    = 3;
    KeyEvent           key_event        = 4;
    TextInput          text_input       = 5;
    ReleaseAllKeys     release_all_keys = 6;
    SetLockState       set_lock_state   = 7;
    PointerMoveRelative pointer_move_relative = 8;
  }
}

// One OS-input event bound to the lease that authorizes it. Mirrors ras_protocol::InputEnvelope.
message InputEnvelope {
  bytes       lease_id   = 1; // exactly 16 bytes; other lengths are InvalidMessage
  uint32      generation = 2;
  uint64      seq        = 3;
  InputAction action      = 4;
}

// Controller -> host: request the single OS-input control lease. Mirrors ras_protocol::ControlMsg::
// ControlRequest. `capabilities` bounded by MAX_CAPABILITIES × MAX_CAPABILITY_LEN.
message ControlRequest {
  repeated string capabilities = 1;
}

// Host -> controller: the lease was granted (host-signed, forward-compat; not trusted as authority
// yet — ADR-069). Mirrors ras_protocol::ControlMsg::ControlGranted.
message ControlGranted {
  bytes           lease_id     = 1; // exactly 16 bytes
  uint32          generation   = 2;
  repeated string capabilities = 3;
  uint64          expires_at   = 4;
  bytes           signature    = 5; // opaque
}

// Host -> controller: the lease was revoked / transferred / denied. Mirrors
// ras_protocol::ControlMsg::ControlRevoked.
message ControlRevoked {
  ErrorCodeProto code = 1;
}

// Host -> controller: the host's OS cursor SHAPE, sent out-of-band so the controller
// composites it client-side at zero latency (never baked into the laggy video —
// Priority 2). Cached by `id`; RGBA is top-down, width*height*4 bytes (ADR-073).
// This is display data, not input — outside Invariant 6.
message CursorShape {
  uint32 id        = 1; // shape cache key
  uint32 hotspot_x = 2; // < width
  uint32 hotspot_y = 3; // < height
  uint32 width     = 4; // 1..=256 pixels
  uint32 height    = 5; // 1..=256 pixels
  bytes  rgba      = 6; // exactly width*height*4 bytes
}

// Host -> controller: reuse a previously-sent CursorShape by id (no RGBA resend).
message CursorCached {
  uint32 id = 1;
}

// Host -> controller: the OS cursor is currently hidden (no shape to draw).
message CursorHidden {}

// Clipboard-text push (ADR-076). Explicit, never auto-synced, and the receiver NEVER auto-pastes —
// it only populates the OS clipboard. Direction is implicit in the role: controller->host requires
// the host-enforced `clipboard.write` capability, host->controller `clipboard.read` (Inv 15). The
// payload is a secret; it is length-capped (ras_protocol::MAX_CLIPBOARD_BYTES) and never logged
// (Inv 8). ras_protocol::ControlMsg::ClipboardText.
message ClipboardText {
  string text = 1; // UTF-8; bounded by MAX_CLIPBOARD_BYTES
}

// In-session chat text between the two consented peers (ADR-082). Base session communication (no
// capability — touches no OS/input/screen surface). The payload is a secret in the Inv-8 sense; it is
// length-capped (ras_protocol::MAX_CHAT_BYTES) and never logged. ras_protocol::ControlMsg::ChatMessage.
message ChatMessage {
  string text = 1; // UTF-8; bounded by MAX_CHAT_BYTES
}

// File push to a catalogued drop target (ADR-086/087). Controller sends target + leaf filename + size
// (NEVER a path); the host authorizes (ras_policy::authorize_file_push) + gets consent, then replies
// FileAccept or FileReject. ras_protocol::ControlMsg::FileOffer.
message FileOffer {
  string target   = 1; // catalogued target name, bounded by MAX_FILE_TARGET
  string filename = 2; // bare leaf filename, bounded by MAX_FILE_NAME
  uint64 size     = 3;
}
message FileAccept {}
message FileReject {
  ErrorCodeProto code = 1;
}
// One chunk of an accepted transfer's bytes (ADR-090). ras_protocol::ControlMsg::FileChunk.
message FileChunk {
  bytes data = 1; // bounded by MAX_FILE_CHUNK
}
message FileComplete {}

// ---------------------------------------------------------------------------
// Top-level control-channel message
// ---------------------------------------------------------------------------

// Reliable control-channel message set. Exactly one variant is set (mirrors the Rust `ControlMsg`
// enum). A ControlMsg with an unset oneof decodes to a RasError(InvalidMessage) in the codec —
// there is no valid "empty" control message.
message ControlMsg {
  oneof kind {
    Hello           hello            = 1;
    StreamConfig    stream_config    = 2;
    KeyframeRequest keyframe_request = 3;
    DecoderFeedback feedback         = 4;
    AuthEnvelope    auth_envelope    = 5;
    Bye             bye              = 6;
    PointerUpdate   pointer          = 7;
    ControlRequest  control_request  = 8;
    ControlGranted  control_granted  = 9;
    ControlRevoked  control_revoked  = 10;
    InputEnvelope   input            = 11;
    CursorShape     cursor_shape     = 12;
    CursorCached    cursor_cached    = 13;
    CursorHidden    cursor_hidden    = 14;
    ClipboardText   clipboard_text   = 15;
    ChatMessage     chat_message     = 16;
    FileOffer       file_offer       = 17;
    FileAccept      file_accept      = 18;
    FileReject      file_reject      = 19;
    FileChunk       file_chunk       = 20;
    FileComplete    file_complete    = 21;
    Annotate        annotate         = 22;
  }
}

// ---------------------------------------------------------------------------
// Bootstrap ALPN (casual-ras/bootstrap/1) message set — Phase 2 authorization
// handshake. DELIBERATELY SEPARATE from the session-phase ControlMsg: it runs on
// a different ALPN/stream, and keeping the two message sets in distinct oneofs
// means a bootstrap message can never be injected into the session control stream
// (or vice versa) at the type level. Payloads that carry a signed,
// canonically-encoded artifact (the AccessRequest, the PASETO grant) ride as
// opaque `bytes` owned by ras-grant — this crate frames them, exactly like
// AuthEnvelope, and NEVER interprets them. See docs/04 §9, docs/design/phase-2.
// ---------------------------------------------------------------------------

// Controller -> host: open the bootstrap phase.
message ClientHello {
  uint32 protocol_version = 1;
}

// Host -> controller: identify the host + the assurance tier it may advertise.
// host_id is a 32-byte Ed25519 public key (the codec rejects any other length).
// tier is a small tag 0..=3 projecting ras_identity::AssuranceTier (proto has no
// u8 and we avoid a dependency on ras-identity); the codec rejects tier > 3.
message HostHello {
  bytes  host_id = 1; // 32-byte Ed25519 public key
  uint32 tier    = 2; // 0=Tier0 .. 3=Tier3
}

// Controller -> host: first-contact pairing (unknown controller). controller_id
// and pubkey are 32-byte Ed25519 public keys; signature is opaque here (verified
// by ras-identity). display_name is length-bounded on decode (DoS).
message PairingRequest {
  bytes  controller_id = 1; // 32-byte Ed25519 public key
  string display_name  = 2; // length-bounded on decode
  bytes  pubkey        = 3; // 32-byte Ed25519 public key
  bytes  signature     = 4; // opaque; verified by ras-identity
}

// Host -> controller: the local user's pairing accept/deny (Invariant 1).
message PairingDecision {
  bool accepted = 1;
}

// Controller -> host: the signed, canonically-encoded AccessRequest. ras-grant
// owns the encoding + the embedded controller signature; opaque here.
message AccessRequestMsg {
  bytes canonical = 1;
}

// Host -> controller: the consent outcome. EXACTLY ONE of {grant, denied} is
// meaningful: on Allow, grant = PASETO v4.public bytes (opaque) and denied is
// UNSPECIFIED; on refuse, grant is absent and denied is a non-UNSPECIFIED code.
// The codec rejects both-set and neither-set as InvalidMessage.
message AccessDecision {
  optional bytes grant  = 1; // PASETO grant (opaque) — present iff allowed
  ErrorCodeProto denied = 2; // reason — UNSPECIFIED (0) iff allowed
}

// Controller -> host: abandon the in-flight request.
message CancelRequest {}

// Either side: a typed protocol error on the bootstrap channel.
message ProtocolError {
  ErrorCodeProto code = 1;
}

// Top-level bootstrap-channel message. Exactly one variant is set (mirrors the
// Rust `BootstrapMsg` enum). An unset oneof decodes to RasError(InvalidMessage).
message BootstrapMsg {
  oneof kind {
    ClientHello      client_hello     = 1;
    HostHello        host_hello       = 2;
    PairingRequest   pairing_request  = 3;
    PairingDecision  pairing_decision = 4;
    AccessRequestMsg access_request   = 5;
    AccessDecision   access_decision  = 6;
    CancelRequest    cancel_request   = 7;
    ProtocolError    protocol_error   = 8;
  }
}
